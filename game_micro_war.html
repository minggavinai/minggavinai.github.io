<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微觀戰爭：免疫防線 - BCTECH 競技版</title>
    <style>
        body { margin: 0; background: #1a0000; overflow: hidden; color: white; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        
        /* 頂部資訊欄 */
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            font-size: 26px; font-weight: 900; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8); 
            pointer-events: none; z-index: 10;
            color: #00ffcc;
        }

        /* 通用彈窗樣式 */
        .overlay {
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: rgba(30, 0, 0, 0.95);
            padding: 40px; border: 3px solid #ff4444; border-radius: 24px; 
            text-align: center; z-index: 100; width: 340px;
            box-shadow: 0 0 50px rgba(255, 68, 68, 0.4);
            backdrop-filter: blur(10px);
        }

        .menu-btn {
            display: block; width: 100%; margin: 15px 0; padding: 16px;
            background: #441111; color: white; border: 1px solid #ff4444;
            border-radius: 12px; cursor: pointer; font-size: 18px; 
            font-weight: bold; transition: all 0.2s;
        }
        .menu-btn:hover { background: #ff4444; transform: scale(1.05); box-shadow: 0 0 15px #ff4444; }
        
        .share-btn { background: #25D366; border: none; margin-top: 25px; }
        .share-btn:hover { background: #1ebe57; box-shadow: 0 0 15px #25D366; }

        h2 { color: #ff4444; margin: 0 0 20px 0; font-size: 28px; }
        .score-display { font-size: 40px; color: #ffdd00; font-weight: 900; margin: 10px 0; display: block; }
    </style>
</head>
<body>

    <div id="ui">🛡️ 免疫強度: <span id="score">0</span></div>
    
    <div id="upgradeMenu" class="overlay">
        <h2>🧬 基因進化</h2>
        <p>請選擇一項細胞增益：</p>
        <button class="menu-btn" onclick="applyUpgrade('fireRate')">🔥 快速反應 (射速+)</button>
        <button class="menu-btn" onclick="applyUpgrade('speed')">⚡ 趨化運動 (速度+)</button>
        <button class="menu-btn" onclick="applyUpgrade('size')">🤏 形態優化 (體型-)</button>
    </div>

    <div id="gameOverPanel" class="overlay">
        <h2>💀 系統崩潰</h2>
        <p>本次免疫評分</p>
        <span id="finalScore" class="score-display">0</span>
        <p style="margin-top:20px;">歷史最強抗體</p>
        <span id="bestScore" style="font-size: 24px; color: #00ffcc;">0</span>
        
        <button class="menu-btn" onclick="location.reload()">重新啟動系統</button>
        <button class="menu-btn share-btn" onclick="shareToWhatsApp()">📢 分享戰績到 WhatsApp</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- 資源管理 ---
const assets = {
    player: new Image(),
    enemy: new Image(),
    bullet: new Image(),
    bg: new Image()
};
assets.player.src = 'assets/player.png';
assets.enemy.src = 'assets/enemy.png';
assets.bullet.src = 'assets/bullet.png';
assets.bg.src = 'assets/background.jpg';

// --- 遊戲平衡參數 ---
let isPaused = false;
let score = 0;
let nextUpgradeScore = 150; // 每 150 分升級一次
let shootProb = 0.035;      // 初始射速
let player = { x: canvas.width/2, y: canvas.height/2, r: 28, speed: 5.5 };
let enemies = [];
let bullets = [];
let keys = {};

window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// --- 核心邏輯 ---
function applyUpgrade(type) {
    if (type === 'fireRate') shootProb += 0.025;
    if (type === 'speed') player.speed += 1.8;
    if (type === 'size') player.r = Math.max(12, player.r - 4);
    
    isPaused = false;
    document.getElementById('upgradeMenu').style.display = 'none';
    nextUpgradeScore += 200; // 難度遞增
    requestAnimationFrame(draw); 
}

function handleGameOver() {
    isPaused = true;
    let savedBest = localStorage.getItem('bctech_best_score') || 0;
    if (score > savedBest) {
        localStorage.setItem('bctech_best_score', score);
        savedBest = score;
    }
    document.getElementById('finalScore').innerText = score;
    document.getElementById('bestScore').innerText = savedBest;
    document.getElementById('gameOverPanel').style.display = 'block';
}

function shareToWhatsApp() {
    const text = `我在 BCTECH 的《免疫防線》拿到了 ${score} 分！你能撐得比我久嗎？🧬\n挑戰連結：${window.location.origin + window.location.pathname}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function spawnEnemy() {
    if (isPaused || enemies.length > 25) return;
    const edge = Math.floor(Math.random() * 4);
    let x, y;
    if (edge === 0) { x = Math.random() * canvas.width; y = -30; }
    else if (edge === 1) { x = canvas.width + 30; y = Math.random() * canvas.height; }
    else if (edge === 2) { x = Math.random() * canvas.width; y = canvas.height + 30; }
    else { x = -30; y = Math.random() * canvas.height; }
    
    enemies.push({ x, y, r: 22, speed: 1.4 + (score / 2000) });
}

function update() {
    if (isPaused) return;

    // 玩家移動
    if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

    // 邊界檢查
    player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
    player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

    // 自動導向射擊
    if (enemies.length > 0 && Math.random() < shootProb) {
        // 尋找最近的敵人
        let nearest = enemies[0];
        let minDist = Math.hypot(nearest.x - player.x, nearest.y - player.y);
        enemies.forEach(e => {
            let d = Math.hypot(e.x - player.x, e.y - player.y);
            if (d < minDist) { minDist = d; nearest = e; }
        });

        let angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
        bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*12, vy: Math.sin(angle)*12 });
    }

    // 更新子彈
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx; b.y += b.vy;
        if (b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) {
            bullets.splice(i, 1);
        }
    }

    // 更新敵人與碰撞檢測
    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        let angle = Math.atan2(player.y - e.y, player.x - e.x);
        e.x += Math.cos(angle) * e.speed;
        e.y += Math.sin(angle) * e.speed;

        // 子彈擊中
        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            if (Math.hypot(e.x - b.x, e.y - b.y) < e.r + 5) {
                enemies.splice(i, 1);
                bullets.splice(j, 1);
                score += 10;
                scoreEl.innerText = score;
                break;
            }
        }

        // 玩家被撞擊
        if (e && Math.hypot(e.x - player.x, e.y - player.y) < player.r + e.r - 8) {
            handleGameOver();
            return;
        }
    }

    // 檢查升級門檻
    if (score >= nextUpgradeScore) {
        isPaused = true;
        document.getElementById('upgradeMenu').style.display = 'block';
    }
}

function draw() {
    if (isPaused) return;

    // 每一幀都重繪背景底色
    ctx.fillStyle = "#1a0000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 繪製背景圖
    if (assets.bg.complete) {
        ctx.globalAlpha = 0.6;
        ctx.drawImage(assets.bg, 0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1.0;
    }

    // 繪製子彈 (發光效果)
    ctx.shadowBlur = 10; ctx.shadowColor = "#00ffff";
    bullets.forEach(b => {
        ctx.drawImage(assets.bullet, b.x - 12, b.y - 12, 24, 24);
    });
    ctx.shadowBlur = 0;

    // 繪製玩家與敵人
    ctx.drawImage(assets.player, player.x - player.r, player.y - player.r, player.r*2, player.r*2);
    enemies.forEach(e => {
        ctx.drawImage(assets.enemy, e.x - e.r, e.y - e.r, e.r*2, e.r*2);
    });

    update();
    requestAnimationFrame(draw);
}

setInterval(spawnEnemy, 900);
draw();
</script>
</body>
</html>
