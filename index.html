    <style>
        :root { --primary: #00ffcc; --bg: #000; --card: #0a0a0a; --text-muted: #888; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; }

        /* 導航欄 */
        nav { 
            background: rgba(0,0,0,0.9); padding: 18px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; 
            backdrop-filter: blur(15px); 
        }
        .logo { font-size: 20px; font-weight: 900; color: var(--primary); text-decoration: none; }
        .nav-links a { color: #eee; text-decoration: none; margin-left: 25px; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); text-shadow: 0 0 8px var(--primary); }

        /* 標題區 */
        header { padding: 120px 8% 80px; text-align: center; background: radial-gradient(circle at center, #111 0%, #000 80%); }
        header h1 { font-size: 3.5rem; margin: 0; font-weight: 900; letter-spacing: -2px; background: linear-gradient(45deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: var(--text-muted); max-width: 700px; margin: 25px auto; font-size: 1.1rem; line-height: 1.8; }

        /* 實驗矩陣布局 */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        
        .project-card { 
            background: var(--card); border-radius: 30px; overflow: hidden; 
            border: 1px solid #1a1a1a; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none; color: inherit;
        }
        .project-card:hover { 
            transform: translateY(-15px); border-color: var(--primary); 
            box-shadow: 0 20px 50px rgba(0,255,204,0.15); 
        }
        
        .img-wrapper { width: 100%; height: 210px; overflow: hidden; background: #000; position: relative; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .project-card:hover img { opacity: 1; scale: 1.1; }

        .project-info { padding: 30px; text-align: center; }
        .project-info h3 { margin: 0 0 12px; font-size: 24px; font-weight: 800; color: #fff; }
        .project-info p { color: var(--text-muted); font-size: 15px; margin-bottom: 0; }
        
        .tag { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .tag-game { background: rgba(0, 255, 204, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .tag-music { background: rgba(255, 0, 85, 0.1); color: #ff0055; border: 1px solid #ff0055; }

        /* 頁腳 */
        footer { padding: 80px 8% 50px; text-align: center; border-top: 1px solid #111; }
        .copyright { color: #333; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .privacy-link { color: #444; text-decoration: none; margin-left: 15px; transition: 0.3s; }
        .privacy-link:hover { color: var(--primary); }
        
        @media (max-width: 600px) {
            header h1 { font-size: 2.5rem; }
            nav { padding: 15px 5%; }
            .nav-links a { margin-left: 15px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="container" id="projects">
        
        <a href="game.html" class="project-card">
            <div class="img-wrapper">

            </div>
            <div class="project-info">
                <span class="tag tag-game">互動實驗 / 遊戲總目</span>
                <h3>🎮 AI 遊戲研究所</h3>
                <p>進入互動開發核心。包含《免疫防線》及其他正在開發中的 AI 遊戲項目。</p>
            </div>

        <a href="music.html" class="project-card">
            <div class="img-wrapper">
                <img src="assets/ai_music_cover.png" alt="AI 音樂實驗室">
            </div>
            <div class="project-info">
                <span class="tag tag-music">藝術實驗 / 音樂</span>
                <h3>🎵 AI 音樂實驗室</h3>
                <p>探索由演算法排列的數位律動，聆聽來自 AI 研究所的專屬音軌。</p>
            </div>
        </a>

    <footer>

    </footer>
